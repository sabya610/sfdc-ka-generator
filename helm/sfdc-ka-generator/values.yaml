# Default values for sfdc-ka-generator.

replicaCount: 1

image:
  repository: sabya610/sfdc-ka-generator
  tag: "0.1.14"
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ka-generator.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Platform related options (EZUA BYOApp integration)
ezua:
  # VirtualService for EZUA application endpoint
  virtualService:
    endpoint: "sfdc-ka-generator.${DOMAIN_NAME}"
    istioGateway: "istio-system/ezaf-gateway"
  # SSO/Authorization via istio AuthorizationPolicy
  authorizationPolicy:
    namespace: "istio-system"
    providerName: "oauth2-proxy"
    matchLabels:
      istio: "ingressgateway"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# HTTP proxy for outbound access (e.g. Salesforce API)
proxy:
  httpProxy: "http://hpeproxy.its.hpecorp.net:80"
  httpsProxy: "http://hpeproxy.its.hpecorp.net:80"
  noProxy: "10.0.0.0/8,192.168.0.0/16,localhost,127.0.0.1,.hpecorp.net,.storage.hpecorp.net,.cluster.local,.svc"

# Application configuration (non-secret) -> rendered into a ConfigMap
config:
  SF_URL: "https://hp.my.salesforce.com"
  KA_BODY_FIELD: "Details__c"
  # Internal cluster endpoint for offline LLM (rag-app llama.cpp).
  # Format: http://<rag-release>-service.<namespace>.svc.cluster.local:<port>/api/llm
  LLM_ENDPOINT: "http://rag-app-service.rag-app.svc.cluster.local:80/api/llm"

# Secrets. Provide the Salesforce session id (and optional OpenAI key).
# For production, prefer an existing secret via `existingSecret`.
secret:
  # If set, use this pre-created secret instead of creating one from values below.
  existingSecret: ""
  # Values below are only used when existingSecret is empty.
  SF_SID: ""
  OPENAI_API_KEY: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
